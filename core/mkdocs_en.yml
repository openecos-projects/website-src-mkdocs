INHERIT: tpl/cfg/mkdocs_base.yml

docs_dir: src/en
site_dir: site/en

site_name: ECOS Team

theme:
  palette:
  - scheme: ecos-light
    primary: white
    accent:
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: ecos-dark
    primary: black
    accent:
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  language: en
  logo: /res/img/web/ecos/logo.svg
  favicon: /res/img/web/ecos/favicon.ico

plugins:
  - tags
  - meta
  - glightbox
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - blog:
      blog_dir: news
      blog_toc: true
      post_url_format: "{file}"
  - include-markdown

extra:
  beian:
    miit: 京ICP备2022009803号-12
    mps:

nav:
  - Home: index.md
  - News:
      - news/index.md
